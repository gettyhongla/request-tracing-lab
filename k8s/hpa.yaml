apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: request-tracing-lab
  namespace: request-tracing-lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: request-tracing-lab
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
